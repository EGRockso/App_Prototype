<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rockso • OAuth Suunto callback</title>
  <meta name="robots" content="noindex" />
  <style>
    :root {
      --brand: #F05A28;
      --bg: #0f1418;
      --card: #121a20;
      --text: #e6edf3;
      --muted: #9fb0bf;
      --ok: #3fb950;
      --warn: #f0883e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Space Grotesk", "Sora", "Manrope", system-ui, -apple-system, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 800px at 10% -10%, rgba(255,255,255,0.08), transparent 60%),
        radial-gradient(1000px 800px at 90% 10%, rgba(255,255,255,0.05), transparent 55%),
        var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--brand);
      box-shadow: 0 0 0 4px rgba(255,255,255,0.05);
    }
    h1 {
      margin: 12px 0 8px;
      font-size: 26px;
      font-weight: 700;
    }
    p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.5;
    }
    .status {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(63,185,80,0.12);
      color: var(--ok);
      font-weight: 600;
    }
    .status.warn {
      background: rgba(240,136,62,0.16);
      color: var(--warn);
    }
    .kv {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      color: var(--text);
      word-break: break-word;
      white-space: pre-wrap;
    }
    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: var(--muted);
    }
    a { color: var(--text); }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge"><span class="dot"></span> Rockso · OAuth callback</div>
    <h1>Suunto connecté</h1>
    <p>Cette page confirme que le callback OAuth a bien été reçu. Vous pouvez fermer cet onglet.</p>
    <div id="status" class="status">Réception du callback…</div>
    <div id="details" class="kv" style="display:none;"></div>
    <div class="footer">Si l'app ne s'ouvre pas automatiquement, revenez à Rockso et réessayez.</div>
  </div>

  <script>
    (function () {
      const provider = "suunto";
      const callbackUrl = "https://hegtnyarfeoyapobysee.supabase.co/functions/v1/oauth-callback";

      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const state = params.get('state');
      const error = params.get('error');
      const errorDescription = params.get('error_description');

      const statusEl = document.getElementById('status');
      const detailsEl = document.getElementById('details');

      const lines = [];
      if (code) lines.push('code=' + code);
      if (state) lines.push('state=' + state);
      if (error) lines.push('error=' + error);
      if (errorDescription) lines.push('error_description=' + errorDescription);

      if (lines.length) {
        detailsEl.textContent = lines.join('
');
        detailsEl.style.display = 'block';
      }

      if (error) {
        statusEl.textContent = 'Erreur OAuth: ' + error;
        statusEl.classList.add('warn');
        return;
      }

      if (!code) {
        statusEl.textContent = 'Callback reçu sans code.';
        statusEl.classList.add('warn');
        return;
      }

      fetch(callbackUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          provider,
          code,
          state,
          error,
          error_description: errorDescription,
          redirect_url: window.location.href
        })
      }).then(async (res) => {
        if (res.ok) {
          statusEl.textContent = 'Connexion transmise à Rockso.';
        } else {
          const text = await res.text();
          statusEl.textContent = 'Callback reçu mais erreur côté serveur.';
          statusEl.classList.add('warn');
          if (text && text.length < 4000) {
            detailsEl.textContent = (detailsEl.textContent ? detailsEl.textContent + '

' : '') + text;
            detailsEl.style.display = 'block';
          }
        }
      }).catch((err) => {
        statusEl.textContent = 'Callback reçu mais impossible de contacter le serveur.';
        statusEl.classList.add('warn');
        detailsEl.textContent = (detailsEl.textContent ? detailsEl.textContent + '

' : '') + String(err);
        detailsEl.style.display = 'block';
      });
    })();
  </script>
</body>
</html>
